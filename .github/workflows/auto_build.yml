name: auto-build-rules

on:
  push:
    paths:
      - 'source/**'
      - 'build_rules.py'
      - '.github/workflows/auto_build.yml'
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v4

    - name: 2. Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Fetch and merge upstream rules
      run: |
        touch source/online_direct.txt
        curl -sSL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/China/China_Domain.list" >> source/online_direct.txt
        if [ -f source/direct.txt ]; then
          cat source/direct.txt >> source/online_direct.txt
        fi
        mv source/online_direct.txt source/direct.txt

    - name: 4. Execute build script
      run: python build_rules.py

    - name: 5. Push compiled rules back to repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add source/ shadowrocket/ quantumultx/ clash/
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 auto build: update rules" && git pull --rebase origin main && git push)
