name: auto-build-rules

on:
  push:
    paths:
      - 'source/**'
      - 'build_rules.py'
      - '.github/workflows/auto_build.yml'
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v4

    - name: 2. Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Fetch and merge upstream rules
      run: |
        touch source/online_direct.txt
        curl -sSL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/China/China_Domain.list" >> source/online_direct.txt
        if [ -f source/direct.txt ]; then
          cat source/direct.txt >> source/online_direct.txt
        fi
        mv source/online_direct.txt source/direct.txt

    - name: 4. Execute build script
      run: python build_rules.py

    - name: 5. Install sing-box & compile to SRS
      run: |
        # Download official sing-box binary
        curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
        tar -xzf sing-box.tar.gz
        mv sing-box-1.11.0-linux-amd64/sing-box .
        
        # Compile JSON to binary SRS format for every json rule found
        for json_file in singbox/*.json; do
          if [ -f "$json_file" ]; then
            srs_file="${json_file%.json}.srs"
            ./sing-box rule-set compile "$json_file" -o "$srs_file"
          fi
        done
        
        # Clean up temporary tools
        rm -rf sing-box sing-box.tar.gz sing-box-1.11.0-linux-amd64

    - name: 6. Push compiled rules back to repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add source/ shadowrocket/ quantumultx/ clash/ pac/ singbox/
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 auto build: update rules" && git pull --rebase origin main && git push)
