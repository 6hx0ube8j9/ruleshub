name: sync-rules

on:
  push:
    paths:
      - 'source/**'
      - 'build_rules.py'
      - '.github/workflows/auto_build.yml'
  schedule:
    - cron: '0 22 */6 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v4

    - name: 2. Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Fetch and merge upstream rules
      run: |
        merge_rules() {
          local target=$1; shift
          local tmp="source/temp_merge.txt"
          > "$tmp"
          for url in "$@"; do
            curl -sSL "$url" >> "$tmp"
            echo "" >> "$tmp"
          done
          [ -f "source/$target" ] && cat "source/$target" >> "$tmp"
          sort -u "$tmp" -o "source/$target"
          rm "$tmp"
        }

        merge_rules "direct.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/China/China_Domain.list"
        merge_rules "google.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Google/Google.list"
        merge_rules "steam.txt"  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Steam/Steam.list"
        merge_rules "epic.txt"   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Epic/Epic.list"
        
        block_urls=(
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/AdvertisingLite/AdvertisingLite.list"
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Privacy/Privacy.list"
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Hijacking/Hijacking.list"
        )
        merge_rules "block.txt" "${block_urls[@]}"
		
		microsoft_urls=(
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Microsoft/Microsoft.list"
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Xbox/Xbox.list"		  
        )
        merge_rules "microsoft.txt" "${microsoft_urls[@]}"
		
		
		
    - name: 4. Execute build script
      run: python build_rules.py

    - name: 5. Install sing-box and compile to SRS
      run: |
        curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
        tar -xzf sing-box.tar.gz
        mv sing-box-1.11.0-linux-amd64/sing-box .
        
        for json_file in singbox/*.json; do
          if [ -f "$json_file" ]; then
            srs_file="${json_file%.json}.srs"
            ./sing-box rule-set compile "$json_file" -o "$srs_file"
          fi
        done
        
        rm -rf sing-box sing-box.tar.gz sing-box-1.11.0-linux-amd64

    - name: 6. Push compiled rules back to repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add source/ shadowrocket/ quantumultx/ clash/ pac/ singbox/
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto build: update rules" && git pull --rebase origin main && git push)
