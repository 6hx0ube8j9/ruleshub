name: ruleshub

on:
  push:
    paths:
      - 'source/**'
      - 'build_rules.py'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 22 */6 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安装 Python 依赖库
        run: pip install PyYAML
        
      - name: 4. 获取并合并上游规则源数据
        run: |
          merge_rules() {
            local target=$1; shift
            local tmp="source/temp_merge.txt"
            > "$tmp"
            for url in "$@"; do
              curl -sSLf "$url" >> "$tmp" || true
              echo "" >> "$tmp"
            done
            if [ -f "source/$target" ]; then
              grep -v "^#" "source/$target" >> "$tmp" || true
            fi
            sort -u "$tmp" | sed '/^$/d' > "source/$target"
            rm "$tmp"
          }
          merge_rules "direct.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/China/China_Domain.list"
          merge_rules "google.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Google/Google.list"
          merge_rules "steam.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Steam/Steam.list"
          merge_rules "epic.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Epic/Epic.list"
          merge_rules "dropbox.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Dropbox/Dropbox.list"
          merge_rules "gemini.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Gemini/Gemini.list"
          merge_rules "blizzard.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Blizzard/Blizzard.list"
          merge_rules "block.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/AdvertisingLite/AdvertisingLite.list" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Privacy/Privacy.list" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Hijacking/Hijacking.list"
          merge_rules "microsoft.txt" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Microsoft/Microsoft.list" "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Xbox/Xbox.list"

      - name: 5. 执行 Python 构建脚本 (仅处理和清洗文本)
        run: python build_rules.py

      - name: 6. 原生 Shell 安全编译 Clash MRS 规则集 (绝不卡死)
        run: |
          curl -Lo mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz
          gunzip -c mihomo.gz > mihomo-bin
          chmod +x mihomo-bin
          
          # 创建一个完全空白的本地配置文件，强制终止内核任何向外的初始化企图
          mkdir -p .config/mihomo
          echo -e "mixed-port: 0\nmode: rule\nlog-level: silent" > .config/mihomo/config.yaml

          # 遍历由 Python 剥离出来的临时 yaml 格式进行无痛MRS封装编译
          for file in clash/tmp_*.yaml; do
            if [ -f "$file" ]; then
              # 转换为输出路径
              if [[ "$file" == *"_domain.yaml" ]]; then
                # 去掉 tmp_ 和 _domain.yaml
                base=$(basename "$file" _domain.yaml | sed 's/tmp_//')
                ./mihomo-bin -d . convert-ruleset domain yaml "$file" "clash/${base}.mrs" mrs || true
              elif [[ "$file" == *"_ip.yaml" ]]; then
                base=$(basename "$file" _ip.yaml | sed 's/tmp_//')
                ./mihomo-bin -d . convert-ruleset ipcidr yaml "$file" "clash/${base}_IP.mrs" mrs || true
              fi
            fi
          done
          # 清理全部中间临时数据
          rm -f clash/tmp_*.yaml mihomo-bin mihomo.gz
          rm -rf .config

      - name: 7. 安装 sing-box 并编译为 SRS 二进制规则
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          mv sing-box-1.11.0-linux-amd64/sing-box .
          
          for json_file in singbox/*.json; do
            if [ -f "$json_file" ]; then
              srs_file="${json_file%.json}.srs"
              ./sing-box rule-set compile "$json_file" -o "$srs_file"
            fi
          done
          rm -rf sing-box sing-box.tar.gz sing-box-1.11.0-linux-amd64

      - name: 8. 将编译好的规则自动推送到 GitHub 仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/ shadowrocket/ quantumultx/ clash/ pac/ singbox/
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto build: update rules" && git pull --rebase origin main && git push)
