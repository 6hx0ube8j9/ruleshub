name: Build Matrix

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'scripts/ruleset.json'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 22 */6 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp
          
      - name: Setup Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail

          mkdir -p scripts
          ARCH="amd64"

          echo "==== 1. Fetching latest Mihomo ===="
          MIHOMO_DOWNLOAD_URL=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" --retry 3 --retry-delay 2 \
            https://api.github.com/repos/MetaCubeX/mihomo/releases | \
            jq -r --arg arch "$ARCH" \
            'map(select(.prerelease==false)) | first | .assets[] | select(.name | contains("linux-" + $arch) and endswith(".gz") and (contains("compatible") | not)) | .browser_download_url' | \
            head -n 1)
          
          if [ -z "$MIHOMO_DOWNLOAD_URL" ] || [ "$MIHOMO_DOWNLOAD_URL" = "null" ]; then
            echo "❌ Error: Failed to fetch Mihomo download URL."
            exit 1
          fi
          echo "Mihomo URL: ${MIHOMO_DOWNLOAD_URL}"
          
          curl -L --retry 3 --retry-delay 2 -o mihomo.gz "$MIHOMO_DOWNLOAD_URL"
          gunzip -f mihomo.gz
          
          BIN_MIHOMO=$(find . -maxdepth 2 -type f -name "*mihomo*" ! -name "*.gz" | head -n 1)
          mv -f "$BIN_MIHOMO" scripts/mihomo-core
          chmod +x scripts/mihomo-core

          echo "✓ 验证 Mihomo 运行状态:"
          ./scripts/mihomo-core -v


          echo "==== 2. Fetching latest Sing-box ===="
          SB_DOWNLOAD_URL=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" --retry 3 --retry-delay 2 \
            https://api.github.com/repos/SagerNet/sing-box/releases | \
            jq -r --arg arch "$ARCH" \
            'map(select(.prerelease==false)) | first | .assets[] | select(.name | contains("linux-" + $arch) and endswith(".tar.gz")) | .browser_download_url' | \
            head -n 1)
          
          if [ -z "$SB_DOWNLOAD_URL" ] || [ "$SB_DOWNLOAD_URL" = "null" ]; then
            echo "❌ Error: Failed to fetch Sing-box download URL."
            exit 1
          fi
          echo "Sing-box URL: ${SB_DOWNLOAD_URL}"
          
          curl -L --retry 3 --retry-delay 2 -o sing-box.tar.gz "$SB_DOWNLOAD_URL"
          tar -xzf sing-box.tar.gz
          
          BIN_SB=$(find . -maxdepth 3 -type f -name "sing-box" | head -n 1)
          cp -f "$BIN_SB" ./scripts/singbox-core
          chmod +x scripts/singbox-core
          
          rm -rf sing-box.tar.gz sing-box-*

          echo "✓ 验证 Sing-box 运行状态:"
          ./scripts/singbox-core version

      - name: Run Parser
        run: python scripts/main.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add -A ruleset/
          git add scripts/source/
          
          if [ -f "scripts/ruleset.json" ]; then
            git add scripts/ruleset.json
          fi

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
          else
            echo "Changes detected. Committing and pushing..."
            git commit -m "Update [skip ci]"
            git pull --rebase origin main
            git push
          fi
