name: Build Matrix

on:
  push:
    branches:
      - main
    paths:
      - 'ruleset/source/**'
      - 'ruleset/ruleset.json'
      - 'build_rules.py'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 22 */6 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Setup Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "==== Fetching latest Mihomo ===="
          MIHOMO_VERSION=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          
          if [ -z "$MIHOMO_VERSION" ] || [ "$MIHOMO_VERSION" = "null" ]; then
            echo "❌ Error: Mihomo version fetch failed."
            exit 1
          fi
          echo "Mihomo version: ${MIHOMO_VERSION}"
          
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip -c mihomo.gz > mihomo-bin
          chmod +x mihomo-bin
          
          mkdir -p ~/.config/mihomo
          curl -L -o ~/.config/mihomo/Country.mmdb "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
          cp ~/.config/mihomo/Country.mmdb ./Country.mmdb

          echo "==== Fetching latest Sing-box ===="
          SB_VERSION=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          
          if [ -z "$SB_VERSION" ] || [ "$SB_VERSION" = "null" ]; then
            echo "❌ Error: Sing-box version fetch failed."
            exit 1
          fi
          echo "Sing-box version: ${SB_VERSION}"
          
          curl -L -o sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/sing-box-${SB_VERSION}-linux-amd64.tar.gz"
          tar -xzvf sing-box.tar.gz
          cp sing-box-*/sing-box ./sing-box
          chmod +x sing-box

      - name: Run Parser
        run: python build_rules.py
        
      - name: Build MRS
        run: |
          cd ruleset/mihomo
          shopt -s nullglob
          
          echo "IP MRS"
          for ip_yaml in tmp_ip_*.yaml; do
            base_name=$(echo "$ip_yaml" | sed 's/tmp_ip_//' | sed 's/.yaml//')
            ../../mihomo-bin convert-ruleset ipcidr yaml "$ip_yaml" "${base_name}.mrs"
            rm -f "$ip_yaml"
          done
          
          echo "Domain MRS"
          for dm_yaml in tmp_domain_*.yaml; do
            base_name=$(echo "$dm_yaml" | sed 's/tmp_domain_//' | sed 's/.yaml//')
            ../../mihomo-bin convert-ruleset domain yaml "$dm_yaml" "${base_name}.mrs"
            rm -f "$dm_yaml"
          done
          
          rm -f tmp_ip_*.yaml tmp_domain_*.yaml
          cd ../..

      - name: Build SRS
        run: |
          cd ruleset/singbox
          shopt -s nullglob
          
          echo "IP SRS"
          for ip_json in tmp_ip_*.json; do
            base_name=$(echo "$ip_json" | sed 's/tmp_ip_//' | sed 's/.json//')
            ../../sing-box rule-set compile "$ip_json" -o "${base_name}.srs"
          done
          
          echo "Domain SRS"
          for dm_json in tmp_domain_*.json; do
            base_name=$(echo "$dm_json" | sed 's/tmp_domain_//' | sed 's/.json//')
            ../../sing-box rule-set compile "$dm_json" -o "${base_name}.srs"
          done
          
          rm -f tmp_ip_*.json tmp_domain_*.json
          cd ../..

      - name: Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A ruleset/
          
          echo "==== 当前 Git 状态 ===="
          git status
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "❌ 警告：即使强制添加了目录，Git 依然认为没有任何文件发生改变！"
          fi
