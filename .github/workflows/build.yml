name: Build Client and Binary Rules

on:
  push:
    branches:
      - main
    paths:
      - 'source/**'
      - 'build_rules.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download and Setup Compilers
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip -c mihomo.gz > mihomo
          chmod +x mihomo
          
          mkdir -p ~/.config/mihomo
          curl -L -o ~/.config/mihomo/Country.mmdb "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
          cp ~/.config/mihomo/Country.mmdb ./Country.mmdb

          SB_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -L -o sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/sing-box-${SB_VERSION}-linux-amd64.tar.gz"
          tar -xzvf sing-box.tar.gz
          cp sing-box-*/sing-box ./sing-box
          chmod +x sing-box

      - name: Fetch and Merge Upstream Rules
        run: |
          mkdir -p source
          
          merge_rules() {
            local target=$1; shift
            local tmp="source/temp_merge.txt"
            > "$tmp"
            
            for url in "$@"; do
              curl -sSLf "$url" >> "$tmp" || true
              echo "" >> "$tmp"
            done
            
            if [ -f "source/$target" ]; then
              grep -v "^#" "source/$target" >> "$tmp" || true
            fi
            
            sort -u "$tmp" | sed '/^$/d' > "source/$target"
            rm "$tmp"
          }

          echo "Syncing tracking upstream lists..."

          merge_rules "direct.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/China/China_Domain.list"

          merge_rules "google.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Google/Google.list"

          merge_rules "steam.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Steam/Steam.list"

          merge_rules "epic.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Epic/Epic.list"

          merge_rules "dropbox.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Dropbox/Dropbox.list"

          merge_rules "gemini.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Gemini/Gemini.list"

          merge_rules "blizzard.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Blizzard/Blizzard.list"
          
          merge_rules "block.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/AdvertisingLite/AdvertisingLite.list" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Privacy/Privacy.list" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Hijacking/Hijacking.list"
          
          merge_rules "microsoft.txt" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Microsoft/Microsoft.list" \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Xbox/Xbox.list"

      - name: Run Python Script to Parse Rules
        run: |
          python build_rules.py

      - name: Compile Mihomo MRS Rulesets
        run: |
          cd clash
          shopt -s nullglob
          
          echo "Compiling Domain MRS rulesets..."
          for domain_yaml in tmp_*_domain.yaml; do
            base_name=$(echo "$domain_yaml" | sed 's/tmp_//' | sed 's/_domain.yaml//')
            ../mihomo convert-ruleset domain yaml "$domain_yaml" "${base_name}_domain.mrs"
          done
          
          echo "Compiling IPCIDR MRS rulesets..."
          for ip_yaml in tmp_*_ipcidr.yaml; do
            base_name=$(echo "$ip_yaml" | sed 's/tmp_//' | sed 's/_ipcidr.yaml//')
            ../mihomo convert-ruleset ipcidr yaml "$ip_yaml" "${base_name}_ipcidr.mrs"
          done
          
          rm -f tmp_*.yaml
          cd ..

      - name: Compile Sing-box SRS Rulesets
        run: |
          cd singbox
          shopt -s nullglob
          
          echo "Compiling Sing-box SRS rulesets..."
          for tmp_json in tmp_*.json; do
            base_name=$(echo "$tmp_json" | sed 's/tmp_//' | sed 's/.json//')
            ../sing-box rule-set compile "$tmp_json" -o "${base_name}.srs"
          done
          
          rm -f tmp_*.json
          cd ..

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add source/* shadowrocket/* quantumultx/* clash/* pac/* singbox/*
          
          if git diff --staged --quiet; then
            echo "No rules changes detected. Skipping commit."
          else
            git commit -m "Automated build: update multi-platform client rules and binary rulesets [skip ci]"
            git push
          fi
