name: Build Clash and Mihomo Rules

on:
  push:
    branches:
      - main
    paths:
      - 'rules/**'
      - 'build_rules.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download and Setup Mihomo
        run: |
          # 1. 获取最新 Tag (例如 v1.19.27) 并通过 sed 过滤掉开头的 v 变成 1.19.27
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/^v//')
          echo "Latest Mihomo Version: $MIHOMO_VERSION"
          
          # 2. 这里的 Release 目录通常需要带 v (v${MIHOMO_VERSION})，而实际文件名不带 v
          curl -L -o mihomo.tar.gz "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.tar.gz"
          
          # 3. 解压并赋予执行权限
          tar -xzf mihomo.tar.gz
          mv mihomo-linux-amd64 mihomo
          chmod +x mihomo
          
          # 提前创建配置文件夹并下载轻量级国家数据库，防止内核因缺少 GeoIP 数据库初始化而卡死挂起
          mkdir -p ~/.config/mihomo
          curl -L -o ~/.config/mihomo/Country.mmdb "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
          cp ~/.config/mihomo/Country.mmdb ./Country.mmdb

      - name: Run Python Script to Parse Rules
        run: |
          python build_rules.py

      - name: Compile Mihomo MRS Rulesets
        run: |
          cd clash
          
          # 1. 遍历并编译所有的临时域名格式规则 (通过四个完整参数防止卡死：behavior format input output)
          for domain_yaml in tmp_*_domain.yaml; do
            if [ -f "$domain_yaml" ]; then
              base_name=$(echo "$domain_yaml" | sed 's/tmp_//' | sed 's/_domain.yaml//')
              echo "正在编译域名型 MRS 规则集: ${base_name}_domain.mrs"
              ../mihomo convert-ruleset domain yaml "$domain_yaml" "${base_name}_domain.mrs"
            fi
          done
          
          # 2. 遍历并编译所有的临时 IP 格式规则集
          for ip_yaml in tmp_*_ipcidr.yaml; do
            if [ -f "$ip_yaml" ]; then
              base_name=$(echo "$ip_yaml" | sed 's/tmp_//' | sed 's/_ipcidr.yaml//')
              echo "正在编译 IP 段型 MRS 规则集: ${base_name}_ipcidr.mrs"
              ../mihomo convert-ruleset ipcidr yaml "$ip_yaml" "${base_name}_ipcidr.mrs"
            fi
          done
          
          # 3. 清理临时生成的过渡文件，保持仓库洁净
          rm -f tmp_*.yaml
          cd ..

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add clash/*
          
          # 检查是否有文件内容变更，防止空 commit 导致 Action 报错
          if git diff --staged --quiet; then
            echo "没有发现任何规则变更，跳过提交。"
          else
            git commit -m "自动构建：更新 Clash YAML 经典配置与 Mihomo MRS 二进制规则集 [skip ci]"
            git push
          fi
